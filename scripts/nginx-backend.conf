# Local backend router: mimics Internal ALB path-based routing for A2.
# /customers* -> Customer service (port 3000)
# /books*     -> Book service (port 3000)
# Used by docker-compose so BFFs have a single URL_BASE_BACKEND_SERVICES.

server {
    listen 3000;
    server_name _;

    location ~ ^/customers(/|$) {
        proxy_pass http://customer_service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/books(/|$) {
        proxy_pass http://book_service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
